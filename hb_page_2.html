<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретна сторінка — Владосичок</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d0116 0%, #1a0933 50%, #2a085c 100%);
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        /* Мерехтливі зірки на фоні */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* Картка з неоновим свіченням */
        .card {
            background: rgba(20, 10, 35, 0.75);
            backdrop-filter: blur(15px);
            padding: 35px 25px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(157, 78, 221, 0.2);
            text-align: center;
            max-width: 460px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(157, 78, 221, 0.4), 0 0 40px rgba(244, 143, 177, 0.3);
            border-color: rgba(244, 143, 177, 0.4);
        }

        /* Стильний неоновий контейнер для фото */
        .photo-container {
            width: 100%;
            max-height: 340px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid transparent;
            background: linear-gradient(#1a0933, #1a0933) padding-box,
                        linear-gradient(45deg, #9d4ede, #ff7096) border-box; /* Градієнтна рамка */
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .card:hover .photo-container img {
            transform: scale(1.05) rotate(1deg);
        }

        h2 {
            font-size: 1.6rem;
            color: #f7d6ff;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(157, 78, 221, 0.6);
        }

        /* Плашка попередження про НЛО */
        .ufo-alert {
            background: rgba(255, 159, 0, 0.1);
            border: 1.5px dashed rgba(255, 159, 0, 0.6);
            padding: 15px;
            border-radius: 16px;
            font-size: 0.95rem;
            color: #ffb703;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Нова крута кнопка замість підкресленого тексту */
        .btn-style {
            display: inline-block;
            background: linear-gradient(45deg, #ff7096, #9d4ede);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.05rem;
            box-shadow: 0 5px 20px rgba(255, 112, 150, 0.4);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            animation: pulse-btn 2s infinite;
        }

        .btn-style:hover {
            background: linear-gradient(45deg, #9d4ede, #ff7096);
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(157, 78, 221, 0.7);
        }

        /* Ефект пульсації кнопки для заклику до дії */
        @keyframes pulse-btn {
            0% { box-shadow: 0 0 0 0 rgba(255, 112, 150, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(255, 112, 150, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 112, 150, 0); }
        }

        /* Анімація зірок */
        .star-blink {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: blink infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <!-- Мерехтливі зірки на фоні -->
    <div class="stars" id="stars-container"></div>

    <div class="card">
        <!-- Контейнер для фото vlad1.jpg -->
        <div class="photo-container">
            <img src="vlad1.jpg" alt="Владосичок">
        </div>
        
        <!-- Підпис-пароль -->
        <h2>Не забувай як роблять дракони 🐉</h2>
        
        <!-- Попередження про інопланетян -->
        <div class="ufo-alert">
            <span style="font-size: 1.5rem;">👽</span> 
            <span>Нехай завжди це буде паролем у разі, якщо прилетять інопланетяни!</span>
        </div>

        <!-- Оновлена, гарна кнопка переходу на 3-ю сторінку -->
        <a href="hb_page_3.html" class="btn-style">Ну, а як же без твого стилю? 😎</a>
    </div>

    <script>
        // Скрипт для генерації зірок
        const container = document.getElementById('stars-container');
        
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.classList.add('star-blink');
            
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            star.style.animationDelay = Math.random() * 2 + 's';
            
            // Додамо трохи кольорових зірок (рожеві та блакитні)
            if(Math.random() > 0.7) {
                star.style.backgroundColor = Math.random() > 0.5 ? '#ff7096' : '#b5e2fa';
            }
            
            container.appendChild(star);
        }
    </script>
</body>
</html>
